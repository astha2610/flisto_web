<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open in Flisto</title>
    <meta
      name="description"
      content="A friend shared a restaurant or collection with you on Flisto. Open the app to view it or save to your Want to Visit list."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --card: #ffffff;
        --text: #1a1a1a;
        --muted: #666;
        --accent: #f57c00;
        --accent-hover: #ff9800;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --card: #2d2d2d;
          --text: #f4f4f5;
          --muted: #a1a1aa;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: var(--card);
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--accent);
        margin-bottom: 0.25rem;
      }
      .tagline {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0 0 10px;
        line-height: 1.3;
      }
      p {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.55;
        margin: 0 0 12px;
      }
      .hint {
        font-size: 0.85rem;
        margin-bottom: 22px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 14px 18px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        margin-bottom: 10px;
        border: none;
        cursor: pointer;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .stores {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .stores a {
        color: var(--muted);
        font-size: 0.875rem;
        text-decoration: none;
      }
      .stores a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">Flisto</div>
      <div class="tagline">Dine. Snap. Remember.</div>
      <h1 id="title">Opening Flisto…</h1>
      <p id="subtitle">
        A friend shared a restaurant or collection with you. Open Flisto to see
        their pick—or save it to your Want to Visit list.
      </p>
      <p class="hint" id="hint">
        If nothing happens, tap the button below or download the app.
      </p>
      <a id="open-app" class="btn btn-primary" href="#">Open in Flisto</a>
      <div class="stores">
        <a href="https://apps.apple.com/app/flisto">App Store</a>
        <span style="color: var(--muted)">·</span>
        <a href="https://play.google.com/store/apps/details?id=com.foodmemory.app"
          >Google Play</a
        >
      </div>
    </div>
    <script>
      (function () {
        var parts = location.pathname.split("/").filter(Boolean);
        var shareId =
          parts[0] === "share" && parts[1] ? parts[1].trim() : null;
        var deepLink = shareId
          ? "foodmemory://share/" + encodeURIComponent(shareId)
          : null;

        var titleEl = document.getElementById("title");
        var subEl = document.getElementById("subtitle");
        var hintEl = document.getElementById("hint");
        var openEl = document.getElementById("open-app");

        if (!shareId) {
          titleEl.textContent = "Invalid link";
          subEl.textContent = "This share link is missing an id.";
          hintEl.style.display = "none";
          openEl.style.display = "none";
          return;
        }

        openEl.setAttribute("href", deepLink);

        setTimeout(function () {
          window.location.href = deepLink;
        }, 200);
      })();
    </script>
  </body>
</html>
